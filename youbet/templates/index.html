{% extends 'base.html' %}

{% block body %}
<h1>Events</h1>
<table>
    <tr>
        <th>Name</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>
    {% for event in events %}
    <tr>
        <td>
            <a href="{{ url_for('event', event_id=event.id) }}">{{ event.name }}</a><br>
        </td>
        <td>
            <a href="{{ url_for('edit_event', event_id=event.id) }}">Edit</a>
        </td>
        <td>
            <a href="{{ url_for('delete_event', event_id=event.id) }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
